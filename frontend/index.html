<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="dashboard-container">
        <div class="header-actions">
            <h2>Employee Management</h2>
            <div class="search-group">
                <button class="btn btn-outline" id="clearBtn">Clear Filters</button>
                <button class="btn btn-success" id="excelBtn">Export to Excel</button>
                <button class="btn btn-primary" id="addBtn">+ Add New</button>
            </div>
        </div>

        <table id="employeeTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="sortable" data-col="fullName">Full Name ↕</th>
                    <th class="sortable" data-col="jobTitle">Job Title ↕</th>
                    <th>Department</th>
                    <th class="sortable" data-col="salary">Salary ↕</th>
                    <th class="sortable" data-col="address">Address ↕</th>
                    <th>Town</th>
                    <th>Actions</th>
                </tr>
                <tr class="filter-row">
                    <td></td>
                    <td><input type="text" id="fName" placeholder="Search Name..."></td>
                    <td><input type="text" id="fJob" placeholder="Search Job..."></td>
                    <td>
                        <select id="fDept">
                            <option value="">All</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                        </select>
                    </td>
                    <td>
                        <div class="salary-range">
                            <input type="number" id="fSalMin" placeholder="Min"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            <input type="number" id="fSalMax" placeholder="Max"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                    </td>
                    <td><input type="text" id="fAddr" placeholder="Search Address..."></td>
                    <td>
                        <select id="fTown">
                            <option value="">All</option>
                        </select>
                    </td>
                    <td></td>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <div class="pagination-container">
            <div>
                Showing <span id="displayCount">0</span> out of <span id="totalCount">0</span> records
            </div>
            <div class="search-group">
                <button class="btn btn-outline" id="prevPage">Previous</button>
                <span id="pageInfo">Page 1 / 1</span>
                <button class="btn btn-outline" id="nextPage">Next</button>
            </div>
        </div>

        <div id="addModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add New Employee</h3>
                    <span class="close" id="closeModal">&times;</span>
                </div>
                <form id="addEmployeeForm">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="newFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="newLastName" required>
                    </div>
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" id="newJobTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="newDepartment" required>
                            <option value="">Select a Department...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Salary</label>
                        <input type="number" step="0.01" id="newSalary" required>
                    </div>
                    <div class="form-group">
                        <label>Town</label>
                        <select id="newTown" required>
                            <option value="">Select a Town...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="newAddress" required>
                    </div>
                    <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">Save
                        Employee
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
